repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: sdd-gate
        name: sdd-gate (spec-first, Principio V)
        entry: python tools/sdd_gate.py
        language: python
        files: ^src/
        pass_filenames: true

      - id: mypy
        name: mypy --strict (src)
        entry: mypy
        language: python
        args: [--strict]
        types: [python]
        files: ^src/
        additional_dependencies:
          - mypy==2.1.0
          - types-requests
          - python-dotenv
          - streamlit

      - id: naming-agnostic
        name: naming agnostico (SPEC-000-naming)
        entry: python tools/check_naming.py src
        language: python
        types: [python]
        files: ^src/
        pass_filenames: false

      - id: import-linter
        name: lint-imports (capas Clean Architecture)
        entry: lint-imports
        language: python
        additional_dependencies: [import-linter]
        files: ^src/
        pass_filenames: false

      - id: sdd-reset
        name: sdd-reset (limpia current-spec post-commit)
        entry: python tools/sdd_reset.py
        language: python
        stages: [post-commit]
        always_run: true
        pass_filenames: false
